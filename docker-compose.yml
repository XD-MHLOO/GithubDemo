services:
  nginx:
    image: nginx:alpine
    container_name: host-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - app
      - dind
    restart: unless-stopped

  dind:
    image: docker:27-dind
    container_name: githubdemo-dind
    runtime: sysbox-runc
    environment:
      DOCKER_TLS_CERTDIR: ""
    command:
      - "--default-address-pool"
      - "base=10.64.0.0/10,size=24"
    volumes:
      - dind-storage:/var/lib/docker
      - nginx_configs:/etc/nginx/conf.d
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: redis-deployment
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
  postgres:
    image: postgres:16
    container_name: main-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: githubdemo

    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d githubdemo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: unless-stopped
    shm_size: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network
  app:
    image: githubdemo:latest
    container_name: githubdemo-app
    environment:
      DOMAIN: ${DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_BASE_PATH: /app/storage
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      MODEL: ${MODEL}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT}
      TEMPORAL_TLS: ${TEMPORAL_TLS}
      BACKEND_URL: http://localhost:3000
      TEMPORAL_ADDRESS: temporal:7233
      DOCKER_HOST: tcp://dind:2375
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dind:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
    networks:
      - app-network
      - temporal-network
    restart: unless-stopped
    volumes:
      - nginx_configs:/etc/nginx/conf.d
      - app-storage:/app/storage

  # ===== TEMPORAL SERVICES =====
  temporal-postgresql:
    image: postgres:16
    container_name: temporal-postgresql
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - temporal-network
    volumes:
      - temporal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  temporal-elasticsearch:
    image: elasticsearch:9.3.2
    container_name: temporal-elasticsearch
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  temporal-admin-tools:
    image: temporalio/admin-tools:1.29.5-tctl-v1.18.4-cli-v1.6.1
    container_name: temporal-admin-tools
    restart: on-failure:6
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - SQL_PASSWORD=temporal
      - ES_HOST=temporal-elasticsearch
      - ES_PORT=9200
      - ES_SCHEME=http
      - ES_VERSION=v7
      - ES_VISIBILITY_INDEX=temporal_visibility_v1_dev
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres-es.sh

  temporal:
    image: temporalio/server:1.30
    container_name: temporal
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - BIND_ON_IP=0.0.0.0
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    networks:
      - temporal-network

    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60

  temporal-create-namespace:
    image: temporalio/admin-tools:1.29.5-tctl-v1.18.4-cli-v1.6.1
    container_name: temporal-create-namespace
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DEFAULT_NAMESPACE=default
    networks:
      - temporal-network
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh

  temporal-ui:
    container_name: temporal-ui
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
      - TEMPORAL_CSRF_COOKIE_INSECURE=true
    image: temporalio/ui:2.48.1
    networks:
      - temporal-network

volumes:
  postgres_data:
  temporal_pgdata:
  dind-storage:  
  nginx_configs:
  app-storage:

networks:
  app-network:
    driver: bridge
    name: app-network
  temporal-network:
    driver: bridge
    name: temporal-network